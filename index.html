<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2B Hotel Board</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Inter', Arial, sans-serif;
    margin:0;
    background:#f5f6fa;
    color:#111827;
}

/* HEADER */
.header{
    background:#0b1220;
    color:white;
    padding:18px 20px;
}

.header-inner{
    max-width:1100px;
    margin:auto;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:18px;
    font-weight:600;
}

.nav a{
    color:#cbd5e1;
    margin-left:14px;
    text-decoration:none;
    font-size:13px;
}

.nav a:hover{ color:white; }

.desc{
    margin-top:10px;
    font-size:12.5px;
    color:#94a3b8;
    line-height:1.5;
    max-width:900px;
}

/* MAIN */
.container{
    max-width:1100px;
    margin:20px auto;
    padding:0 20px;
}

.title{
    font-size:18px;
    font-weight:600;
    margin-bottom:12px;
}

/* FILTER BAR (MINIMAL SAAS STYLE) */
.controls{
    display:flex;
    gap:10px;
    margin-bottom:12px;
    flex-wrap:wrap;
}

/* INPUTS */
input,select,button{
    padding:10px 12px;
    border:1px solid #e5e7eb;
    border-radius:8px;
    font-size:13px;
    background:white;
    outline:none;
}

/* nicer focus */
input:focus, select:focus{
    border-color:#2563eb;
}

/* BUTTON */
button{
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#1d4ed8;
}

/* TABLE CARD */
.table-wrapper{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 12px rgba(0,0,0,0.06);
}

.scroll{
    max-height:520px;
    overflow-y:auto;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
}

thead th{
    background:#f9fafb;
    position:sticky;
    top:0;
    padding:12px;
    text-align:left;
    border-bottom:1px solid #e5e7eb;
    color:#374151;
}

tbody td{
    padding:12px;
    border-bottom:1px solid #f1f5f9;
}

tbody tr:hover{
    background:#f8fafc;
}

.city{
    font-weight:600;
}

.stars{ color:#fbbf24; }

.price{ font-weight:600; }
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="header-inner">

        <div class="top-bar">
            <div class="logo">B2B Hotel Network</div>

            <div class="nav">
                <a href="#">About</a>
                <a href="#">Contact</a>
                <a href="#">WhatsApp</a>
                <a href="#">Telegram</a>
            </div>
        </div>

        <div class="desc">
            Professional B2B hotel booking platform providing real-time hotel rates in Istanbul, Baku, and Moscow. Powered by global hotel APIs for travel agencies and partners.
        </div>

    </div>
</div>

<!-- MAIN -->
<div class="container">

<div class="title">Hotel Rate Dashboard</div>

<!-- FILTER -->
<div class="controls">

    <input id="search" placeholder="Search hotel...">

    <!-- CITY SELECTOR (MAIN FEATURE) -->
    <select id="cityFilter">
        <option value="all">All Cities</option>
        <option value="Istanbul">Istanbul</option>
        <option value="Baku">Baku</option>
        <option value="Moscow">Moscow</option>
    </select>

    <button onclick="sortPrice()">Sort Price</button>
</div>

<!-- TABLE -->
<div class="table-wrapper">
<div class="scroll">
<table>
<thead>
<tr>
<th>City</th>
<th>Hotel Name</th>
<th>Stars</th>
<th>Rate</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>
</div>
</div>

</div>

<script>

const data = [
{city:"Istanbul",name:"Hilton Bosphorus",stars:5,price:180},
{city:"Istanbul",name:"Marriott Istanbul",stars:4,price:150},
{city:"Istanbul",name:"Ramada Plaza",stars:4,price:120},
{city:"Istanbul",name:"Swissotel",stars:5,price:220},
{city:"Istanbul",name:"Elite World",stars:4,price:110},

{city:"Baku",name:"Fairmont Baku",stars:5,price:200},
{city:"Baku",name:"JW Marriott",stars:5,price:230},
{city:"Baku",name:"Holiday Inn",stars:4,price:130},
{city:"Baku",name:"Hilton Baku",stars:5,price:210},
{city:"Baku",name:"Park Inn",stars:4,price:120},

{city:"Moscow",name:"Radisson",stars:5,price:250},
{city:"Moscow",name:"Ritz Carlton",stars:5,price:400},
{city:"Moscow",name:"Azimut",stars:4,price:140},
{city:"Moscow",name:"Metropol",stars:5,price:300},
{city:"Moscow",name:"Holiday Inn",stars:4,price:160},
];

let sorted = false;

/* RENDER */
function render(list){
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    list.forEach(h=>{
        tbody.innerHTML += `
        <tr>
            <td class="city">${h.city}</td>
            <td>${h.name}</td>
            <td class="stars">${"⭐".repeat(h.stars)}</td>
            <td class="price">$${h.price}/night</td>
        </tr>
        `;
    });
}

/* FILTER (CITY + SEARCH) */
function filter(){
    let search = document.getElementById("search").value.toLowerCase();
    let city = document.getElementById("cityFilter").value;

    let filtered = data.filter(h=>{
        return (city === "all" || h.city === city) &&
               h.name.toLowerCase().includes(search);
    });

    render(filtered);
}

/* SORT PRICE */
function sortPrice(){
    let sortedData = [...data].sort((a,b)=>
        sorted ? a.price-b.price : b.price-a.price
    );
    sorted = !sorted;
    render(sortedData);
}

/* EVENTS */
document.getElementById("search").addEventListener("input", filter);
document.getElementById("cityFilter").addEventListener("change", filter);

render(data);

</script>

</body>
</html>
