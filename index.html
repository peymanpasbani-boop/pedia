<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2B Hotel Board</title>

<!-- فونت مینیمال شبیه UI های مدرن ایرانی -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Vazirmatn:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    padding:0;
    background:#f6f7fb;
    font-family: Inter, Vazirmatn, Arial, sans-serif;
    color:#111827;
}

/* HEADER */
.header{
    background:#0b1220;
    color:white;
    padding:16px 20px;
}

.header-inner{
    max-width:1100px;
    margin:auto;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:18px;
    font-weight:600;
}

.nav a{
    color:#cbd5e1;
    margin-left:14px;
    text-decoration:none;
    font-size:13px;
}

.nav a:hover{ color:white; }

.desc{
    margin-top:10px;
    font-size:12.5px;
    color:#94a3b8;
    line-height:1.6;
}

/* MAIN */
.container{
    max-width:1100px;
    margin:20px auto;
    padding:0 20px;
}

.title{
    font-size:17px;
    font-weight:600;
    margin-bottom:12px;
}

/* CONTROLS */
.controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:12px;
}

input,select,button{
    padding:10px;
    border:1px solid #e5e7eb;
    border-radius:8px;
    font-size:13px;
    font-family:inherit;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{ background:#1d4ed8; }

/* TABLE */
.table-wrapper{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 12px rgba(0,0,0,0.06);
}

.scroll{
    max-height:520px;
    overflow-y:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
}

thead th{
    background:#f9fafb;
    position:sticky;
    top:0;
    padding:12px;
    text-align:left;
    border-bottom:1px solid #e5e7eb;
    color:#374151;
    font-weight:600;
}

tbody td{
    padding:12px;
    border-bottom:1px solid #f1f5f9;
}

tbody tr:hover{
    background:#f8fafc;
}

.city{
    font-weight:600;
}

.stars{ color:#fbbf24; }

.price{ font-weight:600; }
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="header-inner">

        <div class="top-bar">
            <div class="logo">B2B Hotel Network</div>

            <div class="nav">
                <a href="#">About</a>
                <a href="#">Contact</a>
                <a href="#">WhatsApp</a>
                <a href="#">Telegram</a>
            </div>
        </div>

        <div class="desc">
            B2B hotel pricing platform for Istanbul, Baku, and Moscow.
            Powered by global hotel APIs and Amadeus integration for travel agencies.
        </div>

    </div>
</div>

<!-- MAIN -->
<div class="container">

<div class="title">داشبورد قیمت هتل‌ها</div>

<div class="controls">
    <input id="search" placeholder="جستجو هتل...">

    <select id="cityFilter">
        <option value="all">همه شهرها</option>
        <option value="Istanbul">استانبول</option>
        <option value="Baku">باکو</option>
        <option value="Moscow">مسکو</option>
    </select>

    <button onclick="sortPrice()">مرتب‌سازی قیمت</button>
</div>

<div class="table-wrapper">
<div class="scroll">
<table>
<thead>
<tr>
<th>شهر</th>
<th>نام هتل</th>
<th>ستاره</th>
<th>نرخ</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>
</div>
</div>

</div>

<script>
const data = [
{city:"Istanbul",name:"Hilton Bosphorus",stars:5,price:180},
{city:"Istanbul",name:"Marriott Istanbul",stars:4,price:150},
{city:"Istanbul",name:"Ramada Plaza",stars:4,price:120},
{city:"Istanbul",name:"Swissotel",stars:5,price:220},
{city:"Istanbul",name:"Elite World",stars:4,price:110},

{city:"Baku",name:"Fairmont Baku",stars:5,price:200},
{city:"Baku",name:"JW Marriott",stars:5,price:230},
{city:"Baku",name:"Holiday Inn",stars:4,price:130},
{city:"Baku",name:"Hilton Baku",stars:5,price:210},
{city:"Baku",name:"Park Inn",stars:4,price:120},

{city:"Moscow",name:"Radisson",stars:5,price:250},
{city:"Moscow",name:"Ritz Carlton",stars:5,price:400},
{city:"Moscow",name:"Azimut",stars:4,price:140},
{city:"Moscow",name:"Metropol",stars:5,price:300},
{city:"Moscow",name:"Holiday Inn",stars:4,price:160},
];

let sorted = false;

function render(list){
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    list.forEach(h=>{
        tbody.innerHTML += `
        <tr>
            <td class="city">${h.city}</td>
            <td>${h.name}</td>
            <td class="stars">${"⭐".repeat(h.stars)}</td>
            <td class="price">$${h.price}/night</td>
        </tr>
        `;
    });
}

function filter(){
    let search = document.getElementById("search").value.toLowerCase();
    let city = document.getElementById("cityFilter").value;

    let filtered = data.filter(h=>{
        return (city==="all" || h.city===city) &&
               h.name.toLowerCase().includes(search);
    });

    render(filtered);
}

function sortPrice(){
    let sortedData = [...data].sort((a,b)=>
        sorted ? a.price-b.price : b.price-a.price
    );
    sorted = !sorted;
    render(sortedData);
}

document.getElementById("search").addEventListener("input",filter);
document.getElementById("cityFilter").addEventListener("change",filter);

render(data);
</script>

</body>
</html>
